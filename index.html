<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小说百科 Wiki 系统 - GitHub版</title>
    <script>
        // 全局错误捕获
        window.onerror = function(msg, url, line, col, error) {
            console.error('【全局错误捕获】', msg, 'URL:', url, '行:', line, '列:', col);
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            console.error('【未处理的 Promise 错误】:', event.reason);
        });
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="wiki-github-storage.js?v=2.7" type="text/javascript" charset="utf-8"></script>
    <script src="wiki-github-core.js?v=2.7" type="text/javascript" charset="utf-8"></script>
    <style>
        :root {
            --color-primary: #4f46e5;
            --color-bg: #f3f4f6;
            /* 使用系统字体栈，确保跨平台兼容性 */
            --custom-font: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --serif-font: 'Noto Serif SC', 'Songti SC', 'SimSun', 'STSong', serif;
        }

        body {
            font-family: var(--custom-font);
            background-color: var(--color-bg);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            /* 优化字体渲染 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 当选择宋体模式时的类 */
        .font-serif {
            font-family: var(--serif-font);
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 打印时隐藏水印 */
        @media print {
            #global-watermark, #mobile-watermark {
                display: none !important;
            }
        }
        /* 保存按钮脉冲动画 */
        @keyframes pulse-save {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
        }
        .save-pulse {
            animation: pulse-save 2s infinite;
        }
        
        /* 水印动画效果（可选，添加微动效提升体验） */
        #global-watermark, #mobile-watermark {
            transition: opacity 0.3s ease;
        }
        
        #global-watermark:hover, #mobile-watermark:hover {
            opacity: 0.6;
        }

        /* 搜索下拉框 */
        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            margin-top: 8px;
            border: 1px solid #e5e7eb;
        }
        .announcement-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 16px;
            color: white;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .announcement-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 450px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* 模式切换 - 仅后台模式显示，位置下移避免遮挡 */
        .mode-badge {
            position: fixed;
            top: 110px;
            right: 12px;
            z-index: 50;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .mode-badge.backend {
            background: #fce7f3;
            color: #be185d;
        }

        /* 分享码输入 */
        .share-code-input {
            letter-spacing: 0.5em;
            font-family: monospace;
            text-transform: uppercase;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 3px; }
    </style>
</head>
<body class="h-screen flex flex-col text-gray-800">

    <!-- 模式徽章（仅后台模式显示） -->
    <div id="mode-badge" class="mode-badge backend hidden">后台模式</div>

    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm z-50 px-4 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3 overflow-hidden">
            <div class="bg-indigo-600 text-white p-2 rounded-lg shrink-0">
                <i class="fa-solid fa-book-open"></i>
            </div>
            <div class="min-w-0">
                <h1 id="wiki-title-display" class="text-lg font-bold text-gray-900 truncate">未命名 Wiki</h1>
                <p id="wiki-subtitle-display" class="text-[10px] text-gray-500 truncate mt-0.5 hidden"></p>
            </div>
        </div>

        <div class="flex items-center gap-2 relative">
            <div class="relative hidden sm:block">
                <input type="text" id="global-search" placeholder="搜索编号或名称..." 
                    class="pl-8 pr-3 py-1.5 bg-gray-100 border-none rounded-full text-sm focus:ring-2 focus:ring-indigo-500 w-32 sm:w-48 transition-all"
                    oninput="app.handleSearchInput(this.value)"
                    onfocus="app.showSearchDropdown()"
                    onblur="setTimeout(() => app.hideSearchDropdown(), 200)">
                <i class="fa-solid fa-search absolute left-3 top-2 text-gray-400 text-xs"></i>
                <div id="search-dropdown" class="search-dropdown hidden"></div>
            </div>

            <!-- 后台模式显示编辑按钮 -->
            <div id="mode-switch-container" class="bg-gray-100 p-1 rounded-lg flex text-xs font-medium hidden">
                <button onclick="app.setMode('view')" id="btn-mode-view" class="px-3 py-1.5 rounded-md bg-white shadow-sm text-gray-800 transition-all">
                    <i class="fa-solid fa-eye sm:mr-1"></i><span class="hidden sm:inline">查看</span>
                </button>
                <button onclick="app.setMode('edit')" id="btn-mode-edit" class="px-3 py-1.5 rounded-md text-gray-500 hover:text-gray-800 transition-all">
                    <i class="fa-solid fa-pen sm:mr-1"></i><span class="hidden sm:inline">编辑</span>
                </button>
            </div>

            <!-- 退出后台模式按钮 -->
            <button id="logout-backend-btn" onclick="app.logoutBackend()" class="hidden text-gray-500 hover:text-red-600 p-2" title="退出后台模式">
                <i class="fa-solid fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main id="main-container" class="flex-1 overflow-hidden relative bg-gray-50"></main>
    <!-- 全局水印 - 横向摆放 -->
    <div id="global-watermark" class="fixed bottom-16 right-4 z-40 opacity-40 pointer-events-none select-none hidden sm:block">
        <p class="text-[10px] text-gray-500 italic whitespace-nowrap tracking-wide">
            完整功能请移步GitHub仓库：Wiki-Is-She-Also-me-Who-is-So-Cute-ZZQLTB-Local
        </p>
    </div>
    
    <!-- 移动端水印 -->
    <div id="mobile-watermark" class="fixed bottom-16 right-2 z-40 opacity-30 pointer-events-none select-none sm:hidden">
        <p class="text-[8px] text-gray-400 italic whitespace-nowrap">
            GitHub: Wiki-Is-She-Also-me-Who-is-So-Cute-ZZQLTB-Local
        </p>
    </div>

    <!-- 底部导航 -->
    <nav class="bg-white border-t border-gray-200 shrink-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-around items-center h-14">
            <button onclick="app.router('home')" class="nav-btn flex flex-col items-center gap-0.5 text-gray-500 hover:text-indigo-600 w-full py-1" data-target="home">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px]">首页</span>
            </button>
            <button onclick="app.router('characters')" class="nav-btn flex flex-col items-center gap-0.5 text-gray-500 hover:text-indigo-600 w-full py-1" data-target="characters">
                <i class="fa-solid fa-users text-lg"></i>
                <span class="text-[10px]">角色</span>
            </button>
            <button onclick="app.router('non-characters')" class="nav-btn flex flex-col items-center gap-0.5 text-gray-500 hover:text-indigo-600 w-full py-1" data-target="non-characters">
                <i class="fa-solid fa-map text-lg"></i>
                <span class="text-[10px]">设定</span>
            </button>
            <button onclick="app.router('graph')" class="nav-btn flex flex-col items-center gap-0.5 text-gray-500 hover:text-indigo-600 w-full py-1" data-target="graph">
                <i class="fa-solid fa-diagram-project text-lg"></i>
                <span class="text-[10px]">关系</span>
            </button>
            <button onclick="app.router('settings')" id="nav-settings" class="nav-btn flex flex-col items-center gap-0.5 text-gray-500 hover:text-indigo-600 w-full py-1" data-target="settings">
                <i class="fa-solid fa-cog text-lg"></i>
                <span class="text-[10px]">设置</span>
            </button>
        </div>
    </nav>

    <!-- ========== Templates ========== -->

    <!-- 登录/配置模板 -->
    <template id="tpl-login">
        <div class="h-full overflow-y-auto p-4 fade-in">
            <div class="max-w-md mx-auto pt-10">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-brands fa-github text-4xl text-indigo-600"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">GitHub Wiki</h2>
                    <p class="text-gray-500 text-sm mt-2">连接到GitHub仓库以访问Wiki数据</p>
                </div>

                <!-- 登录选项 -->
                <div id="login-options" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
                    <button id="frontend-login-btn" class="w-full py-3 bg-amber-50 text-amber-600 rounded-lg hover:bg-amber-100 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-key"></i>
                        前台模式（分享码）
                    </button>
                    <button id="backend-login-btn" class="w-full py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-lock"></i>
                        后台模式（密码）
                    </button>
                </div>

                <!-- 后台登录表单 -->
                <div id="backend-login-form" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">GitHub用户名</label>
                        <input type="text" id="github-owner" class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="例如: yourname">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">仓库名称</label>
                        <input type="text" id="github-repo" class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="例如: my-wiki">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">分支 (可选)</label>
                        <input type="text" id="github-branch" class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="默认: main">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Personal Access Token</label>
                        <input type="password" id="github-token" class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="ghp_xxxxxxxxxxxx">
                        <p class="text-xs text-gray-400 mt-1">
                            <i class="fa-solid fa-info-circle mr-1"></i>
                            需要repo权限，<a href="https://github.com/settings/tokens" target="_blank" class="text-indigo-600 hover:underline">在此创建</a>
                        </p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">后台密码（可选）</label>
                        <input type="password" id="backend-password" class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="设置密码以记住登录状态">
                        <p class="text-xs text-gray-400 mt-1">设置密码后，7天内刷新页面无需重新登录</p>
                    </div>
                    <button onclick="app.loginBackend()" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-link"></i>
                        连接并进入后台
                    </button>
                    <button onclick="app.showLoginOptions()" class="w-full py-2 text-gray-500 hover:text-gray-700 transition text-sm">
                        返回
                    </button>
                </div>

                <!-- 分享码登录表单 -->
                <div id="share-code-form" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
                    <div class="text-center mb-4">
                        <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fa-solid fa-key text-2xl text-amber-600"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800">输入分享码</h3>
                        <p class="text-gray-500 text-sm mt-1">输入存档分享码以访问Wiki内容</p>
                    </div>
                    <div>
                        <input type="text" id="share-code-input" 
                            class="share-code-input w-full p-4 border-2 border-gray-200 rounded-lg text-center text-2xl font-bold tracking-widest uppercase focus:border-indigo-500 focus:ring-0 outline-none transition" 
                            placeholder="XXXXXXXX"
                            maxlength="8">
                    </div>
                    <button onclick="app.verifyShareCode()" class="w-full py-3 bg-amber-500 text-white rounded-lg font-medium hover:bg-amber-600 transition">
                        验证并进入
                    </button>
                    <button onclick="app.showLoginOptions()" class="w-full py-2 text-gray-500 hover:text-gray-700 transition text-sm">
                        返回
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- 首页模板 -->
    <template id="tpl-home">
        <div class="h-full overflow-y-auto p-4 fade-in">
            <div class="max-w-3xl mx-auto space-y-6 pb-20">
        
                <!-- 自动备份恢复提示（非阻塞式） -->
                <div id="backup-restore-banner" class="hidden bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-xl p-4 shadow-sm cursor-pointer hover:shadow-md transition-all group" onclick="app.showBackupRestoreDialog()">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center shrink-0 group-hover:scale-110 transition">
                            <i class="fa-solid fa-clock-rotate-left text-lg"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-bold text-amber-900 text-sm">检测到自动备份</h3>
                                <span class="text-[10px] bg-amber-200 text-amber-800 px-2 py-0.5 rounded-full">可恢复</span>
                            </div>
                            <p class="text-xs text-amber-700 mb-1">备份时间：<span id="backup-restore-time" class="font-mono font-medium"></span></p>
                            <p class="text-[10px] text-amber-600/80">点击此处查看详情并选择是否恢复数据</p>
                        </div>
                        <button onclick="event.stopPropagation(); app.dismissBackupBanner()" class="text-amber-400 hover:text-amber-600 w-6 h-6 flex items-center justify-center rounded-full hover:bg-amber-100 transition">
                            <i class="fa-solid fa-times text-xs"></i>
                        </button>
                    </div>
                </div>
                
                <!-- 公告区域（初始隐藏，由JS控制显示） -->
                <div id="announcement-section" class="hidden">
                    <div class="announcement-banner" onclick="app.viewAnnouncement()">
                        <div class="flex items-center gap-2 mb-2">
                            <i class="fa-solid fa-bullhorn"></i>
                            <span class="font-bold text-sm">最新公告</span>
                        </div>
                        <h3 id="announcement-title" class="text-lg font-bold mb-1"></h3>
                        <p id="announcement-preview" class="text-sm opacity-90 line-clamp-2"></p>
                        <p id="announcement-meta" class="text-xs opacity-75 mt-2 flex items-center gap-2"></p>
                    </div>
                </div>

                <!-- 大蓝框：显示欢迎标题和欢迎副标题（非Wiki名称/全局声明） -->
                <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 opacity-10 transform translate-x-10 -translate-y-10">
                        <i class="fa-solid fa-dragon text-9xl"></i>
                    </div>
                    <!-- 【关键修复】这些ID对应欢迎语，非Wiki名称 -->
                    <h2 id="welcome-title" class="text-2xl font-bold mb-2 relative z-10">欢迎来到 Wiki</h2>
                    <p id="welcome-subtitle" class="opacity-90 mb-4 text-sm relative z-10">探索角色、世界观与错综复杂的关系网。</p>
                    
                    <!-- 编辑按钮（仅编辑模式显示） -->
                    <div class="edit-only hidden flex gap-2 relative z-10 flex-wrap">
                        <button onclick="app.createEntry('character')" class="bg-white text-indigo-600 px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-indigo-50 transition">
                            <i class="fa-solid fa-plus mr-1"></i> 角色
                        </button>
                        <button onclick="app.createEntry('non-character')" class="bg-indigo-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-indigo-400 transition border border-indigo-400">
                            <i class="fa-solid fa-plus mr-1"></i> 设定
                        </button>
                        <!-- 批量导入按钮（本地版功能，GitHub版可隐藏） -->
                        <label class="edit-only hidden bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-emerald-400 transition border border-emerald-400 cursor-pointer">
                            <i class="fa-solid fa-file-import mr-1"></i> 批量导入角色
                            <input type="file" class="hidden" accept=".txt" onchange="app.batchImportCharacters(this)">
                        </label>
                    </div>
                </div>
                <!-- 【新增】时间轴控制栏 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                        </div>
                        <div>
                            <div class="text-xs text-gray-500 font-medium">当前时间线</div>
                            <select id="timeline-node-selector" onchange="app.switchTimelineNode(this.value)" 
                                class="text-sm font-bold text-gray-800 bg-transparent border-none outline-none cursor-pointer">
                                <option value="all">📚 全量视图（无剧透保护）</option>
                                <option value="latest" selected>🆕 最新进度</option>
                                <!-- 动态加载其他节点 -->
                            </select>
                        </div>
                    </div>
                    <button onclick="app.showTimelineGuide()" class="text-xs text-indigo-600 hover:text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-lg">
                        <i class="fa-solid fa-circle-info mr-1"></i>时间线说明
                    </button>
                </div>

                <!-- 【新增】新读者引导框（首次访问显示） -->
                <div id="new-reader-guide" class="hidden bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-xl p-4 shadow-sm">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center text-amber-600 shrink-0">
                            <i class="fa-solid fa-book-open"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-amber-900 mb-1">新读者从这里开始吧！</h3>
                            <p class="text-sm text-amber-700 mb-3">为避免剧透，建议从故事起点开始阅读。只显示初始的角色和设定。</p>
                            <div class="flex gap-2">
                                <button onclick="app.enterNewReaderMode()" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-amber-600 transition">
                                    进入起点时间线
                                </button>
                                <button onclick="app.dismissReaderGuide()" class="text-amber-700 hover:text-amber-800 px-3 py-2 text-sm">
                                    我已熟悉，全量浏览
                                </button>
                            </div>
                        </div>
                        <button onclick="app.dismissReaderGuide()" class="text-amber-400 hover:text-amber-600">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    </div>
                </div>
                <!-- 剧情梗概大按钮 -->
                <div onclick="app.router('synopsis')" class="synopsis-home-entry flex items-center justify-between p-4 bg-gradient-to-r from-amber-100 to-yellow-100 rounded-xl cursor-pointer hover:shadow-md transition border-2 border-amber-200">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-amber-600 shrink-0">
                            <i class="fa-solid fa-film text-xl"></i>
                        </div>
                        <div>
                            <div class="font-bold text-amber-900">剧情梗概</div>
                            <div class="text-xs text-amber-700">查看完整故事线</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-amber-600 text-lg"></i>
                </div>

                        </button>
                    </div>
                </div>

                <!-- 后台模式：分享码管理 -->
                <div class="edit-only hidden bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-key text-amber-600"></i> 存档分享码
                    </h2>
                    <div class="space-y-3">
                        <div class="flex gap-2">
                            <input type="text" id="new-share-code" class="flex-1 p-2 border rounded-lg text-sm" placeholder="留空自动生成">
                            <input type="text" id="share-code-desc" class="flex-1 p-2 border rounded-lg text-sm" placeholder="描述（可选）">
                            <button onclick="app.generateShareCode()" class="px-4 py-2 bg-amber-500 text-white rounded-lg text-sm hover:bg-amber-600 transition">
                                生成
                            </button>
                        </div>
                        <div id="share-code-list" class="space-y-2"></div>
                    </div>
                </div>

                <!-- 后台模式：数据导入 -->
                <div class="edit-only hidden bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-file-import text-green-600"></i> 数据导入
                    </h2>
                    <div class="space-y-3">
                        <p class="text-xs text-gray-500">
                            <i class="fa-solid fa-info-circle mr-1"></i>
                            支持两种方式：文件夹导入（适合开发）或 ZIP 导入（适合备份恢复）
                        </p>
                        
                        <!-- 文件夹导入 -->
                        <input type="file" id="import-folder" webkitdirectory directory multiple 
                            class="hidden" onchange="app.handleImportFolder(this)">
                        <button onclick="document.getElementById('import-folder').click()" 
                            class="w-full py-2 bg-green-50 text-green-600 rounded-lg text-sm hover:bg-green-100 transition flex items-center justify-center gap-2">
                            <i class="fa-solid fa-folder-open"></i>
                            选择Wiki数据文件夹
                        </button>
                        
                        <!-- ZIP 文件导入（新增） -->
                        <input type="file" id="import-zip" accept=".zip" 
                            class="hidden" onchange="app.handleZipFileSelect(this)">
                        <button onclick="document.getElementById('import-zip').click()" 
                            class="w-full py-2 bg-blue-50 text-blue-600 rounded-lg text-sm hover:bg-blue-100 transition flex items-center justify-center gap-2">
                            <i class="fa-solid fa-file-zipper"></i>
                            导入ZIP备份文件
                        </button>
                        
                        <div id="import-status" class="hidden text-xs text-center py-2 rounded-lg"></div>
                    </div>
                </div>

                <!-- 后台模式：GitHub设置 -->
                <div class="edit-only hidden bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fa-brands fa-github text-gray-800"></i> GitHub设置
                    </h2>
                    <div class="space-y-3">
                        <div class="text-sm text-gray-600">
                            <p>当前仓库: <span id="github-repo-display" class="font-mono">未连接</span></p>
                        </div>
                        <button onclick="app.disconnectGitHub()" class="w-full py-2 bg-red-50 text-red-600 rounded-lg text-sm hover:bg-red-100 transition">
                            断开连接
                        </button>
                    </div>
                </div>

                <!-- 数据导出 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-database text-blue-600"></i> 数据管理
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="app.exportData()" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium text-gray-700 transition">
                            <i class="fa-solid fa-file-code text-lg mb-1 block"></i>
                            导出JSON
                        </button>
                        <button onclick="app.exportZipBackup()" class="p-2 bg-indigo-50 hover:bg-indigo-100 rounded-lg text-sm font-medium text-indigo-700 transition">
                            <i class="fa-solid fa-file-zipper text-lg mb-1 block"></i>
                            导出ZIP
                        </button>
                    </div>
                </div>

                <!-- 【新增】保存到 GitHub 按钮区域（仅后台模式显示） -->
                <div class="edit-only hidden bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl shadow-lg p-6 text-white mt-6">
                    <h2 class="text-lg font-bold mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-cloud-upload-alt"></i> 保存更改
                    </h2>
                    <p class="text-sm opacity-90 mb-4">将所有修改（词条、设置、公告等）永久保存到 GitHub 仓库</p>
                    <button onclick="app.saveSettingsData()" class="w-full py-3 bg-white text-indigo-600 rounded-lg font-bold hover:bg-indigo-50 transition shadow-md flex items-center justify-center gap-2">
                        <i class="fa-solid fa-save"></i>
                        立即保存到 GitHub
                    </button>
                    <p id="settings-save-status" class="text-xs text-center mt-3 opacity-0 transition-opacity">
                        <i class="fa-solid fa-check-circle mr-1"></i>保存成功
                    </p>
                </div>
            </div>
        </div>
    </template>
    <!-- 时间节点管理列表模板 -->
    <template id="tpl-timeline-nodes">
        <div class="h-full flex flex-col bg-gray-50 fade-in">
            <div class="bg-white border-b px-4 py-3 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <button onclick="app.router('settings')" class="text-gray-500 hover:text-gray-800">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <span class="font-bold text-gray-800">时间节点管理</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="app.addTimelineNode()" class="px-3 py-1.5 text-purple-600 hover:bg-purple-50 rounded-lg text-sm">
                        <i class="fa-solid fa-plus mr-1"></i>添加节点
                    </button>
                    <button onclick="app.saveTimelineNodes()" class="px-4 py-1.5 bg-purple-600 text-white rounded-lg hover:bg-purple-700 shadow text-sm">
                        <i class="fa-solid fa-save mr-1"></i>保存
                    </button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div class="max-w-3xl mx-auto space-y-4 pb-20">
                    <!-- 特殊节点设置 -->
                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-4">
                        <h3 class="font-bold text-amber-900 mb-3">特殊节点标记</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-amber-700 mb-1">新读者起点</label>
                                <select id="new-reader-node" class="w-full p-2 border border-amber-300 rounded-lg text-sm bg-white">
                                    <option value="">-- 未设置 --</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-amber-700 mb-1">最新进度节点</label>
                                <select id="latest-node" class="w-full p-2 border border-amber-300 rounded-lg text-sm bg-white">
                                    <option value="">-- 自动（最后节点）--</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 节点列表（可拖拽排序） -->
                    <div id="timeline-nodes-list" class="space-y-2">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- 时间节点编辑模板 -->
    <template id="tpl-timeline-node-edit">
        <div class="h-full flex flex-col bg-gray-50 fade-in">
            <div class="bg-white border-b px-4 py-3 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <button onclick="app.router('timeline-nodes')" class="text-gray-500 hover:text-gray-800">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <span class="font-bold text-gray-800" id="node-edit-title">编辑节点</span>
                </div>
                <button onclick="app.saveCurrentNodeConfig()" class="px-4 py-1.5 bg-purple-600 text-white rounded-lg hover:bg-purple-700 shadow text-sm">
                    <i class="fa-solid fa-save mr-1"></i>保存
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-4 pb-20">
                    <!-- 左侧：可用词条 -->
                    <div class="bg-white rounded-xl border border-gray-200 p-4">
                        <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-database text-gray-400"></i>
                            可用词条
                            <span class="text-xs text-gray-400 font-normal">点击添加到当前节点</span>
                        </h3>
                        <div class="space-y-2 mb-3">
                            <input type="text" id="available-search" placeholder="搜索词条..." 
                                class="w-full p-2 border border-gray-200 rounded-lg text-sm"
                                oninput="app.filterAvailableEntries(this.value)">
                            <div class="flex gap-2">
                                <button onclick="app.showAvailableByType('character')" class="flex-1 py-1 text-xs bg-blue-50 text-blue-600 rounded">角色</button>
                                <button onclick="app.showAvailableByType('non-character')" class="flex-1 py-1 text-xs bg-emerald-50 text-emerald-600 rounded">设定</button>
                                <button onclick="app.showAvailableByType('all')" class="flex-1 py-1 text-xs bg-gray-100 text-gray-600 rounded">全部</button>
                            </div>
                        </div>
                        <div id="available-entries-list" class="space-y-1 max-h-[60vh] overflow-y-auto">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    
                    <!-- 右侧：已配置词条 -->
                    <div class="bg-white rounded-xl border border-purple-200 p-4">
                        <h3 class="font-bold text-purple-800 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-list-check text-purple-500"></i>
                            当前节点包含
                            <span class="text-xs text-purple-400 font-normal">可拖拽排序，点击设为置顶版本</span>
                        </h3>
                        <div id="node-entries-list" class="space-y-2 max-h-[60vh] overflow-y-auto">
                            <!-- 动态生成 -->
                        </div>
                        <div class="mt-4 p-3 bg-purple-50 rounded-lg text-xs text-purple-700">
                            <i class="fa-solid fa-lightbulb mr-1"></i>
                            提示：同一角色的多个版本可共存，置顶版本将优先在时间线中展示
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ========== JavaScript ========== -->
    <script src="wiki-github-storage.js"></script>
    <script src="wiki-github-core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof app !== 'undefined' && app.init) {
                app.init();
            }
        });
    </script>
</body>
</html>
